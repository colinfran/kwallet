  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyv4akZsp_uvIG6hvoHibjqNEDHfaOysj9nZm9iBIlytpNn7zc8pANIFvM11EsCF_tK3A/exec'
    const form = document.querySelector('#form')
    const btn = document.querySelector('#submit')
    form.addEventListener('submit', e => {
      e.preventDefault()
      btn.disabled = true
      btn.innerHTML = "Loading"
      console.log(form)
      document.querySelector('#date').value = new Date().toLocaleString()
      fetch(scriptURL, {
        method: 'POST',
        body: new FormData(form)
      }).then(response => {
        btn.disabled = false
        btn.innerHTML = "Submit"
        document.querySelector('#email').value = ""
        alert('Email submitted successfully.', response)
      }).catch(error => {
        btn.disabled = false
        btn.innerHTML = "Submit"
        alert('Error!', error.message)
      })
    })
  </script>
